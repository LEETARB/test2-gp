services:

  backend:
    build: ./backend
    container_name: itpc-backend
    volumes:
      - ./backend/itpc.db:/app/itpc.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: itpc-frontend
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: itpc-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: itpc-postgres
    environment:
      POSTGRES_DB: itpc_db
      POSTGRES_USER: itpc_user
      POSTGRES_PASSWORD: itpc_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: